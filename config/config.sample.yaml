project:
  name: personal-a-share-research-workbench
  timezone: Asia/Shanghai

qlib:
  # Change this to your local Qlib data directory if needed.
  provider_uri: ~/.qlib/qlib_data/cn_data_simple
  region: cn
  universe: csi300
  start_date: '2008-01-01'
  end_date: '2014-12-31'
  score_date: '2014-12-31'
  top_k: 30
  label_horizon: 5
  features:
    - $close
    - $open
    - $high
    - $low
    - $volume

model:
  type: lightgbm
  train_start: '2008-01-01'
  train_end: '2011-12-31'
  valid_start: '2012-01-01'
  valid_end: '2012-12-31'
  score_start: '2013-01-01'
  score_end: '2014-12-31'
  params:
    n_estimators: 400
    learning_rate: 0.03
    num_leaves: 63
    min_child_samples: 80
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    n_jobs: 1

candidate_generation:
  mode: live_akshare

live_data:
  lookback_days: 120
  max_workers: 4
  start_date: null
  end_date: null

announcements:
  source: eastmoney
  lookback_days: 7
  input_file: data/announcements/sample_announcements.json
  page_size: 50
  max_pages: 2
  download_pdf_text: true
  pdf_text_chars: 3000

llm:
  # Default safe mode: no external LLM dependency required.
  provider: mock
  model: unavailable-codex-fallback
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1/chat/completions
  timeout: 90
  temperature: 0.1
  max_tokens: 220
  system_prompt: 你是A股公告事件分析助手。请把公告整理为可执行事件卡片，只输出JSON。

priority_scoring:
  quant_weight: 0.55
  event_weight: 0.45
  event_card_weights:
    importance: 0.30
    bias: 0.20
    confidence: 0.15
    freshness: 0.20
    event_type: 0.10
    density: 0.05
  importance_map:
    high: 1.0
    medium: 0.6
    low: 0.2
  bias_map:
    positive: 1.0
    neutral: 0.45
    negative: 0.0
  confidence_map:
    high: 1.0
    medium: 0.65
    low: 0.3
  event_type_map:
    业绩: 1.0
    经营进展: 0.8
    分红回购: 0.75
    融资并购: 0.7
    风险事项: 0.35
    其他: 0.2
  top_event_slots: 3

risk_scoring:
  quant_weight: 0.20
  event_weight: 0.80
  min_risk_score: 0.15
  top_event_slots: 3
  event_card_weights:
    importance: 0.35
    negativity: 0.25
    freshness: 0.20
    confidence: 0.10
    event_type: 0.10
  importance_map:
    high: 1.0
    medium: 0.6
    low: 0.2
  negativity_map:
    negative: 1.0
    neutral: 0.35
    positive: 0.0
  confidence_map:
    high: 1.0
    medium: 0.65
    low: 0.3
  event_type_map:
    风险事项: 1.0
    融资并购: 0.55
    其他: 0.25
    业绩: 0.15
    经营进展: 0.1
    分红回购: 0.1

paths:
  outputs_dir: data/outputs
  processed_dir: data/processed
  announcements_dir: data/announcements
  archives_dir: data/archives
  logs_dir: logs
