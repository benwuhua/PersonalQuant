project:
  name: personal-a-share-research-workbench
  timezone: Asia/Shanghai

qlib:
  provider_uri: ~/.qlib/qlib_data/cn_data_full
  region: cn
  universe: all
  start_date: '2017-01-01'
  end_date: '2026-04-17'
  score_date: '2026-04-17'
  top_k: 30
  label_horizon: 5
  features:
    - $close
    - $open
    - $high
    - $low
    - $volume

model:
  type: lightgbm
  train_start: '2017-01-01'
  train_end: '2022-12-31'
  valid_start: '2023-01-01'
  valid_end: '2024-12-31'
  score_start: '2025-01-01'
  score_end: '2026-04-17'
  params:
    n_estimators: 800
    learning_rate: 0.02
    num_leaves: 31
    max_depth: 6
    min_child_samples: 120
    subsample: 0.8
    colsample_bytree: 0.7
    reg_alpha: 0.5
    reg_lambda: 1.0
    random_state: 42
    n_jobs: 1

candidate_generation:
  mode: live_akshare

quant_pipeline:
  label_tasks:
    return_horizons: [5, 10, 20]
    hit_threshold: 0.03
    risk_threshold: -0.05
    event_windows: [1, 3, 5]

live_data:
  lookback_days: 260
  max_workers: 4
  start_date: null
  end_date: null
  consolidation_breakout_universe: all_a
  consolidation_breakout_prefilter_mode: turnover_top_n
  consolidation_breakout_prefilter_top_n: 1200
  consolidation_breakout_extra_codes: []
  wangji_universe: all_a
  wangji_prefilter_mode: turnover_top_n
  wangji_prefilter_top_n: 1200
  wangji_extra_codes: []

historical_extension:
  enabled: true
  path: data/processed/akshare_recent_history.csv.gz
  start_date: '20200926'
  end_date: null
  universe: all_a
  max_workers: 4

announcements:
  source: eastmoney
  lookback_days: 7
  input_file: data/announcements/sample_announcements.json
  page_size: 50
  max_pages: 2
  download_pdf_text: true
  pdf_text_chars: 3000

llm:
  provider: mock
  model: unavailable-codex-fallback
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1/chat/completions
  timeout: 90
  temperature: 0.1
  max_tokens: 220
  system_prompt: 你是A股公告事件分析助手。请把公告整理为可执行事件卡片，只输出JSON。

priority_scoring:
  quant_weight: 0.55
  event_weight: 0.45
  event_card_weights:
    importance: 0.30
    bias: 0.20
    confidence: 0.15
    freshness: 0.20
    event_type: 0.10
    density: 0.05
  importance_map:
    high: 1.0
    medium: 0.6
    low: 0.2
  bias_map:
    positive: 1.0
    neutral: 0.45
    negative: 0.0
  confidence_map:
    high: 1.0
    medium: 0.65
    low: 0.3
  event_type_map:
    业绩: 1.0
    经营进展: 0.8
    分红回购: 0.75
    融资并购: 0.7
    风险事项: 0.35
    其他: 0.2
  top_event_slots: 3

risk_scoring:
  quant_weight: 0.20
  event_weight: 0.80
  min_risk_score: 0.15
  top_event_slots: 3
  event_card_weights:
    importance: 0.35
    negativity: 0.25
    freshness: 0.20
    confidence: 0.10
    event_type: 0.10
  importance_map:
    high: 1.0
    medium: 0.6
    low: 0.2
  negativity_map:
    negative: 1.0
    neutral: 0.35
    positive: 0.0
  confidence_map:
    high: 1.0
    medium: 0.65
    low: 0.3
  event_type_map:
    风险事项: 1.0
    融资并购: 0.55
    其他: 0.25
    业绩: 0.15
    经营进展: 0.1
    分红回购: 0.1

paths:
  outputs_dir: data/outputs
  processed_dir: data/processed
  announcements_dir: data/announcements
  archives_dir: data/archives
  validation_dir: data/validation
  logs_dir: logs
